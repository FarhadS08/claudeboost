<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeBoost Enterprise — Architecture Playground</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0b14;--card:#12131f;--border:#1e2035;--text:#e4e4ed;--dim:#6b6b80;--primary:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--mono:'SF Mono',Consolas,'Liberation Mono',Menlo,monospace;--sans:system-ui,-apple-system,sans-serif}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;overflow:hidden;height:100vh}
  .app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:48px 1fr 140px;height:100vh}
  .header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--card)}
  .header h1{font-family:var(--mono);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
  .header h1 span{color:var(--primary)}
  .tabs{display:flex;gap:2px}
  .tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--dim);background:transparent;border:none}
  .tab.active{color:var(--primary);background:rgba(124,58,237,.12)}
  .tab:hover{color:var(--text)}
  .legend{display:flex;gap:12px;font-size:11px;color:var(--dim)}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .sidebar{border-right:1px solid var(--border);background:var(--card);overflow-y:auto;padding:12px}
  .sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:12px 0 8px 4px;font-weight:600}
  .sidebar h3:first-child{margin-top:4px}
  .layer-toggle{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:12px;font-weight:500}
  .layer-toggle:hover{background:rgba(255,255,255,.04)}
  .layer-toggle input{accent-color:var(--primary)}
  .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .conn-toggle{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:11px;color:var(--dim)}
  .conn-toggle:hover{color:var(--text)}
  .conn-toggle input{accent-color:var(--primary)}
  .conn-line{width:16px;height:2px;border-radius:1px}
  .comment-item{padding:8px;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:6px;font-size:11px;border:1px solid var(--border)}
  .comment-target{color:var(--primary);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
  .comment-text{color:var(--dim);margin-top:3px;line-height:1.4}
  .comment-del{float:right;color:var(--dim);cursor:pointer;font-size:10px;opacity:.5}
  .comment-del:hover{color:var(--red);opacity:1}
  .canvas-area{position:relative;overflow:hidden;background:var(--bg)}
  .canvas-area svg{width:100%;height:100%}
  .prompt-area{grid-column:1/-1;border-top:1px solid var(--border);background:var(--card);padding:12px 20px;display:flex;flex-direction:column;gap:8px}
  .prompt-header{display:flex;justify-content:space-between;align-items:center}
  .prompt-header span{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600}
  .copy-btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--primary);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
  .copy-btn:hover{background:rgba(124,58,237,.1)}
  .prompt-text{flex:1;overflow-y:auto;font-family:var(--mono);font-size:11px;color:var(--dim);line-height:1.6;white-space:pre-wrap}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
  .modal-overlay.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:420px;max-width:90vw}
  .modal h2{font-size:15px;font-weight:700;margin-bottom:4px}
  .modal .file{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:12px}
  .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px}
  .modal textarea{width:100%;height:80px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:var(--sans);font-size:12px;resize:none;outline:none}
  .modal textarea:focus{border-color:var(--primary)}
  .schema-box{font-family:var(--mono);font-size:11px;color:var(--dim);background:rgba(0,0,0,.3);border-radius:8px;padding:10px;margin:8px 0;line-height:1.5;max-height:120px;overflow-y:auto;white-space:pre-wrap}
  .modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
  .btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-secondary{background:transparent;color:var(--dim);border:1px solid var(--border)}
  .node{cursor:pointer;transition:all .15s}
  .node:hover rect{stroke-width:2;filter:drop-shadow(0 0 8px rgba(124,58,237,.2))}
  .node text{pointer-events:none}
  @keyframes flowDash{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
  .flow-anim{animation:flowDash .8s linear infinite}
  .conn-path{fill:none;stroke-width:1.5;transition:opacity .2s}
  .conn-label{font-size:9px;font-family:var(--mono)}
</style>
</head>

    <h1><span>&#9889;</span> ClaudeBoost Architecture</h1>

</div>
<div class="modal-overlay" id="modal">

    </div>
  </div>
</div>

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  // Tabs
  const tabsEl=document.getElementById('tabs');
  tabsEl.textContent='';
  ['pipeline','data','pages','planned'].forEach(v=>{
    const b=document.createElement('button');
    b.className='tab'+(state.view===v?' active':'');
    b.textContent=v.charAt(0).toUpperCase()+v.slice(1);
    b.addEventListener('click',()=>setView(v));
    tabsEl.appendChild(b);
  });

  // Sidebar
  const sb=document.getElementById('sidebar');
  sb.textContent='';
  const h1=document.createElement('h3');h1.textContent='Layers';sb.appendChild(h1);
  Object.entries(LAYERS).forEach(([id,l])=>{
    const label=document.createElement('label');label.className='layer-toggle';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=state.layers[id];
    cb.addEventListener('change',()=>{state.layers[id]=!state.layers[id];render();});
    const dot=document.createElement('div');dot.className='dot';dot.style.background=l.color;
    label.appendChild(cb);label.appendChild(dot);label.appendChild(document.createTextNode(l.label));
    sb.appendChild(label);
  });

  const h2=document.createElement('h3');h2.textContent='Connections';sb.appendChild(h2);
  Object.entries(CONN_TYPES).forEach(([id,c])=>{
    const label=document.createElement('label');label.className='conn-toggle';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=state.conns[id];
    cb.addEventListener('change',()=>{state.conns[id]=!state.conns[id];render();});
    const line=document.createElement('div');line.className='conn-line';line.style.background=c.color;
    label.appendChild(cb);label.appendChild(line);label.appendChild(document.createTextNode(c.label));
    sb.appendChild(label);
  });

  const h3=document.createElement('h3');h3.textContent='Notes ('+state.comments.length+')';sb.appendChild(h3);
  if(state.comments.length===0){
    const hint=document.createElement('div');hint.style.cssText='font-size:11px;color:var(--dim);padding:4px';
    hint.textContent='Click any component to add notes';sb.appendChild(hint);
  }
  state.comments.forEach((c,i)=>{
    const div=document.createElement('div');div.className='comment-item';
    const del=document.createElement('span');del.className='comment-del';del.textContent='\u2715';
    del.addEventListener('click',()=>{state.comments.splice(i,1);render();});
    const tgt=document.createElement('div');tgt.className='comment-target';tgt.textContent=c.targetLabel;
    const txt=document.createElement('div');txt.className='comment-text';txt.textContent=c.text;
    div.appendChild(del);div.appendChild(tgt);div.appendChild(txt);sb.appendChild(div);
  });

  renderCanvas();
  updatePrompt();
}

function renderCanvas(){
  const svg=document.getElementById('canvas');
  const view=VIEWS[state.view];if(!view)return;
  // Clear
  while(svg.firstChild)svg.removeChild(svg.firstChild);

  // Defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  Object.entries(CONN_TYPES).forEach(([id,c])=>{
    const marker=document.createElementNS('http://www.w3.org/2000/svg','marker');
    marker.setAttribute('id','arrow-'+id);marker.setAttribute('markerWidth','8');marker.setAttribute('markerHeight','6');
    marker.setAttribute('refX','7');marker.setAttribute('refY','3');marker.setAttribute('orient','auto');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 8 3, 0 6');poly.setAttribute('fill',c.color);
    marker.appendChild(poly);defs.appendChild(marker);
  });
  svg.appendChild(defs);

  // Connections
  view.connections.forEach(c=>{
    if(!state.conns[c.type])return;
    const from=view.nodes.find(n=>n.id===c.from);const to=view.nodes.find(n=>n.id===c.to);
    if(!from||!to||!state.layers[from.layer]||!state.layers[to.layer])return;
    const ct=CONN_TYPES[c.type];
    const x1=from.x+from.w/2,y1=from.y+from.h,x2=to.x+to.w/2,y2=to.y;
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M'+x1+','+y1+' Q'+x1+','+my+' '+mx+','+my+' Q'+x2+','+my+' '+x2+','+y2);
    path.setAttribute('class','conn-path flow-anim');path.setAttribute('stroke',ct.color);
    path.setAttribute('marker-end','url(#arrow-'+c.type+')');
    if(ct.dash)path.setAttribute('stroke-dasharray',ct.dash);
    svg.appendChild(path);
    if(c.label){
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',String(mx));txt.setAttribute('y',String(my-5));txt.setAttribute('text-anchor','middle');
      txt.setAttribute('class','conn-label');txt.setAttribute('fill','#6b6b80');txt.textContent=c.label;
      svg.appendChild(txt);
    }
  });

  // Nodes
  view.nodes.forEach(n=>{
    if(!state.layers[n.layer])return;
    const lc=LAYERS[n.layer]?LAYERS[n.layer].color:'#666';
    const sc=n.status==='built'?'#10b981':n.status==='placeholder'?'#f59e0b':'#ef4444';
    const hasComment=state.comments.some(c=>c.target===n.id);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node');
    if(n.status==='planned')g.style.opacity='0.35';
    g.addEventListener('click',()=>openModal(n.id));

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',String(n.x));rect.setAttribute('y',String(n.y));
    rect.setAttribute('width',String(n.w));rect.setAttribute('height',String(n.h));
    rect.setAttribute('rx','10');rect.setAttribute('fill',lc+'10');
    rect.setAttribute('stroke',hasComment?'#7c3aed':lc+'40');
    rect.setAttribute('stroke-width',hasComment?'2':'1');
    g.appendChild(rect);

    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',String(n.x+n.w-12));circle.setAttribute('cy',String(n.y+12));
    circle.setAttribute('r','4');circle.setAttribute('fill',sc);
    g.appendChild(circle);

    const title=document.createElementNS('http://www.w3.org/2000/svg','text');
    title.setAttribute('x',String(n.x+12));title.setAttribute('y',String(n.y+20));
    title.setAttribute('fill','#e4e4ed');title.setAttribute('font-size','11');title.setAttribute('font-weight','700');
    title.textContent=n.label;g.appendChild(title);

    const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x',String(n.x+12));sub.setAttribute('y',String(n.y+n.h-10));
    sub.setAttribute('fill','#6b6b80');sub.setAttribute('font-size','9');sub.setAttribute('font-family','monospace');
    sub.textContent=n.subtitle.length>38?n.subtitle.slice(0,38)+'...':n.subtitle;g.appendChild(sub);

    svg.appendChild(g);
  });
}

function setView(v){
  state.view=v;
  if(v==='planned')state.layers.planned=true;
  render();
}

function openModal(nodeId){
  const view=VIEWS[state.view];const node=view.nodes.find(n=>n.id===nodeId);if(!node)return;
  state.selectedNode=node;
  const titleEl=document.getElementById('modal-title');
  titleEl.textContent=node.label+' ';
  const badge=document.createElement('span');badge.className='status-badge';
  badge.textContent=node.status;
  badge.style.background=node.status==='built'?'rgba(16,185,129,.15)':node.status==='placeholder'?'rgba(245,158,11,.15)':'rgba(239,68,68,.15)';
  badge.style.color=node.status==='built'?'#10b981':node.status==='placeholder'?'#f59e0b':'#ef4444';
  titleEl.appendChild(badge);

  document.getElementById('modal-file').textContent=node.subtitle;
  const schemaEl=document.getElementById('modal-schema');
  if(node.schema){schemaEl.textContent=node.schema;schemaEl.style.display='block';}
  else{schemaEl.style.display='none';}
  const existing=state.comments.find(c=>c.target===nodeId);
  document.getElementById('modal-comment').value=existing?existing.text:'';
  document.getElementById('modal').classList.add('show');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}

function saveComment(){
  const text=document.getElementById('modal-comment').value.trim();
  const node=state.selectedNode;if(!node)return;
  state.comments=state.comments.filter(c=>c.target!==node.id);
  if(text)state.comments.push({target:node.id,targetLabel:node.label,targetFile:node.subtitle,text:text});
  closeModal();render();
}

function updatePrompt(){
  const visibleLayers=Object.entries(state.layers).filter(function(e){return e[1];}).map(function(e){return LAYERS[e[0]]?LAYERS[e[0]].label:'';}).filter(Boolean);
  const view=VIEWS[state.view];
  const built=view.nodes.filter(function(n){return n.status==='built';}).length;
  const placeholder=view.nodes.filter(function(n){return n.status==='placeholder';}).length;
  const planned=view.nodes.filter(function(n){return n.status==='planned';}).length;

  let p='ClaudeBoost Enterprise Architecture \u2014 '+state.view.charAt(0).toUpperCase()+state.view.slice(1)+' View\n';
  p+='Visible layers: '+visibleLayers.join(', ')+'\n';
  p+='Status: '+built+' built, '+placeholder+' placeholder, '+planned+' planned\n';

  if(state.comments.length>0){
    p+='\nNotes on specific components:\n';
    state.comments.forEach(function(c){p+='\n**'+c.targetLabel+'** ('+c.targetFile+'):\n'+c.text+'\n';});
  }
  if(state.view==='pipeline')p+='\nPipeline: Developer \u2192 .mcp.json \u2192 /mcp route \u2192 Auth \u2192 Classify \u2192 Score \u2192 Fetch Rules \u2192 Enhance \u2192 Score \u2192 Log \u2192 Response';
  else if(state.view==='data')p+='\n8 tables in Supabase PostgreSQL. RLS bypassed \u2014 all API routes use service role client.';
  else if(state.view==='planned')p+='\nPlanned: Workflow Automation, Multi-Model, Integrations, Analytics, Billing, SSO, RAG';

  document.getElementById('prompt-output').textContent=p;
}

document.getElementById('copyBtn').addEventListener('click',function(){
  navigator.clipboard.writeText(document.getElementById('prompt-output').textContent);
  this.textContent='Copied!';this.style.color='var(--green)';
  var btn=this;setTimeout(function(){btn.textContent='Copy';btn.style.color='';},2000);
});
document.getElementById('cancelBtn').addEventListener('click',closeModal);
document.getElementById('saveBtn').addEventListener('click',saveComment);
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

render();
</script>
</body>
</html>
