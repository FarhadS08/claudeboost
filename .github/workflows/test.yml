name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[keychain]" pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=claudeboost_mcp --cov-report=term-missing

      - name: Check coverage threshold
        run: pytest tests/ --cov=claudeboost_mcp --cov-fail-under=70 -q
